{{- $root := . -}}
{{- range $index := until (int .Values.studentCount) }}
{{- $number := add $index 1 }}
{{- $studentName := include "nightfall.studentName" $number }}
{{- $resourceName := include "nightfall.studentResourceName" (list $root $number) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $resourceName }}
  labels:
    {{- include "nightfall.labels" $root | nindent 4 }}
    nightfall.openai.com/student: {{ $studentName }}
type: Opaque
stringData:
  NIGHTFALL_USERNAME: {{ $root.Values.auth.username | quote }}
  NIGHTFALL_PASSWORD: {{ $root.Values.auth.password | quote }}
  TOKEN_SECRET: {{ printf "%s:%s:%s:token" $root.Release.Name $root.Values.auth.tokenSeed $studentName | sha256sum | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $resourceName }}
  labels:
    {{- include "nightfall.labels" $root | nindent 4 }}
    nightfall.openai.com/student: {{ $studentName }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nightfall.name" $root }}
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      nightfall.openai.com/student: {{ $studentName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nightfall.name" $root }}
        app.kubernetes.io/instance: {{ $root.Release.Name }}
        nightfall.openai.com/student: {{ $studentName }}
    spec:
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          securityContext:
            {{- toYaml $root.Values.containerSecurityContext | nindent 12 }}
          env:
            - name: HOME
              value: /tmp
            - name: STUDENT_ID
              value: {{ $studentName | quote }}
            - name: ROOT_PATH
              value: {{ printf "%s/%s" ($root.Values.routePrefix | trimSuffix "/") (include "nightfall.studentRouteName" (list $root $number)) | quote }}
            - name: TOKEN_TTL_SECONDS
              value: {{ $root.Values.auth.tokenTtlSeconds | quote }}
            - name: DATASET_SEED
              value: {{ $root.Values.dataset.seed | quote }}
            - name: COMPUTER_GENERATION_INTERVAL_SECONDS
              value: {{ $root.Values.dataset.generationIntervalSeconds | quote }}
            - name: GENERATED_COMPUTER_COUNT
              value: {{ $root.Values.dataset.generatedComputerCount | quote }}
            - name: NIGHTFALL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $resourceName }}
                  key: NIGHTFALL_USERNAME
            - name: NIGHTFALL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $resourceName }}
                  key: NIGHTFALL_PASSWORD
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $resourceName }}
                  key: TOKEN_SECRET
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $resourceName }}
  labels:
    {{- include "nightfall.labels" $root | nindent 4 }}
    nightfall.openai.com/student: {{ $studentName }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "nightfall.name" $root }}
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    nightfall.openai.com/student: {{ $studentName }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
{{- end }}
